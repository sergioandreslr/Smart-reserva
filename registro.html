<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Smart Reserva</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-login">

    <div class="contenedor-auth">
        <div class="auth-caja seccion-formulario">
            <div class="auth-header">
                <h1 class="logo auth-logo"><i class="fa-solid fa-utensils"></i> Smart Reserva</h1>
                <h2>Crea tu cuenta</h2>
            </div>
            
            <form id="formRegistro" class="formulario">
                
                <div class="grupo-form">
                    <label for="nombreRegistro">Nombre Completo</label>
                    <div class="input-con-icono">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="nombreRegistro" placeholder="Juan Pérez" required>
                    </div>
                </div>

                <div class="grupo-form">
                    <label for="emailRegistro">Correo Electrónico</label>
                    <div class="input-con-icono">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="emailRegistro" placeholder="tu@correo.com" required>
                    </div>
                </div>

                <div class="grupo-form">
                    <label for="passwordRegistro">Contraseña</label>
                    <div class="input-con-icono">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="passwordRegistro" placeholder="********" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primario auth-btn">
                    <i class="fa-solid fa-user-plus"></i> Registrarse
                </button>
                
                <p class="auth-enlace">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Script de autenticación -->
    <script src="auth.js"></script>
</body>
</html>
